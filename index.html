<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bemito Gaming | MLBB & Magic Chess Go Go Pro Joki</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        /* === CSS Variables & Core Reset === */
        :root {
            --bg-dark: #020409;
            --bg-surface: #070d19;
            --bg-card: #0d172a;
            --cyan-primary: #00e5ff;
            --cyan-dim: rgba(0, 229, 255, 0.12);
            --cyan-glow: 0 0 10px rgba(0, 229, 255, 0.6), 0 0 25px rgba(0, 229, 255, 0.3);
            --text-light: #f1f5f9;
            --text-muted: #94a3b8;
            --danger: #ff0055;
            --success: #00ff66;
            --gold: #ffbd00;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            overflow-x: hidden;
            background-image: 
                linear-gradient(var(--cyan-dim) 1px, transparent 1px),
                linear-gradient(90deg, var(--cyan-dim) 1px, transparent 1px);
            background-size: 50px 50px;
            background-position: center top;
            background-attachment: fixed;
        }

        h1, h2, h3, h4, .brand-font {
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        h2 { font-size: 2.3rem; margin-bottom: 1rem; color: #fff; text-shadow: 0 0 15px rgba(0, 229, 255, 0.15); }
        p { line-height: 1.6; }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .cyan-text {
            color: var(--cyan-primary);
            text-shadow: 0 0 8px var(--cyan-primary);
        }

        /* === Buttons === */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 28px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
            text-decoration: none;
            color: var(--bg-dark);
            background: var(--cyan-primary);
            border: 2px solid var(--cyan-primary);
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            clip-path: polygon(8% 0, 100% 0, 92% 100%, 0 100%);
            box-shadow: var(--cyan-glow);
        }

        .btn:hover {
            background: transparent;
            color: var(--cyan-primary);
            box-shadow: 0 0 30px var(--cyan-primary) inset;
        }

        .btn-outline {
            background: transparent;
            color: var(--cyan-primary);
            box-shadow: none;
        }
        
        .btn-outline:hover {
            background: var(--cyan-primary);
            color: var(--bg-dark);
            box-shadow: var(--cyan-glow);
        }

        /* === Navbar === */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(2, 4, 9, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--cyan-dim);
            z-index: 1000;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: 2px;
            color: #fff;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-links {
            display: flex;
            gap: 30px;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-light);
            text-decoration: none;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            text-transform: uppercase;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--cyan-primary);
            text-shadow: 0 0 5px var(--cyan-primary);
        }

        /* === Hero Section === */
        .hero {
            min-height: 95vh;
            display: flex;
            align-items: center;
            position: relative;
            padding-top: 100px;
            background: radial-gradient(circle at 50% 50%, rgba(0, 229, 255, 0.05) 0%, transparent 65%);
        }

        .hero-content {
            max-width: 680px;
            z-index: 2;
        }

        .hero h1 {
            font-size: 3.5rem;
            line-height: 1.1;
            margin-bottom: 20px;
        }

        .hero p {
            font-size: 1.15rem;
            color: var(--text-muted);
            margin-bottom: 35px;
            font-family: 'Rajdhani', sans-serif;
        }

        .hero-visual {
            position: absolute;
            right: 5%;
            top: 50%;
            transform: translateY(-50%);
            width: 440px;
            height: 440px;
            background: linear-gradient(135deg, transparent, rgba(0, 229, 255, 0.05));
            border: 2px solid var(--cyan-primary);
            box-shadow: var(--cyan-glow);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            animation: float 8s ease-in-out infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
        }

        .hero-visual-inner {
            width: 88%;
            height: 88%;
            border: 1px dashed var(--cyan-primary);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        @keyframes float {
            0% { transform: translateY(-50%) rotate(0deg); }
            50% { transform: translateY(-53%) rotate(2deg); }
            100% { transform: translateY(-50%) rotate(0deg); }
        }

        /* === Pricing Lists === */
        .pricing-tables {
            padding: 80px 0;
            background: linear-gradient(to bottom, transparent, var(--bg-surface));
        }

        .tables-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .price-card {
            background: var(--bg-card);
            border: 1px solid var(--cyan-dim);
            border-radius: 8px;
            padding: 30px;
            transition: all 0.3s;
        }

        .price-card:hover {
            border-color: var(--cyan-primary);
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.1);
        }

        .price-card h3 {
            font-size: 1.6rem;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--cyan-dim);
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .price-list-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.95rem;
        }

        .price-list-item:last-child {
            border-bottom: none;
        }

        .badge-package {
            font-size: 0.75rem;
            background: rgba(0, 229, 255, 0.15);
            color: var(--cyan-primary);
            padding: 3px 8px;
            border-radius: 4px;
            text-transform: uppercase;
        }

        /* === Interactive Boosting Calculator === */
        .calculator-section {
            padding: 80px 0;
        }

        .game-tabs {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .tab-btn {
            background: rgba(10, 14, 23, 0.8);
            border: 1px solid var(--cyan-dim);
            color: var(--text-muted);
            padding: 12px 30px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
        }

        .tab-btn.active {
            border-color: var(--cyan-primary);
            color: var(--cyan-primary);
            box-shadow: var(--cyan-glow);
            background: rgba(0, 229, 255, 0.05);
        }

        .calc-container {
            background: var(--bg-surface);
            border: 1px solid var(--cyan-dim);
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            max-width: 900px;
            margin: 0 auto;
            border-radius: 4px;
        }

        .calc-panel {
            display: none;
        }

        .calc-panel.active {
            display: block;
        }

        .calc-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 30px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-family: 'Rajdhani', sans-serif;
            font-weight: bold;
            font-size: 1.1rem;
            color: var(--text-light);
            text-transform: uppercase;
        }

        .input-group select, .input-group input {
            background: var(--bg-dark);
            border: 1px solid #1e293b;
            padding: 14px;
            color: #fff;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: all 0.3s;
            border-radius: 4px;
        }

        .input-group select:focus, .input-group input:focus {
            border-color: var(--cyan-primary);
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.2);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .checkbox-group input {
            width: 18px;
            height: 18px;
            accent-color: var(--cyan-primary);
            cursor: pointer;
        }

        .checkbox-group label {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;
            color: var(--text-muted);
            cursor: pointer;
        }

        .price-output {
            text-align: center;
            background: rgba(0, 229, 255, 0.03);
            border: 1px solid var(--cyan-dim);
            padding: 30px;
            margin-bottom: 30px;
            position: relative;
        }

        .price-output p {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.2rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .price-val {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem;
            font-weight: 900;
            color: var(--cyan-primary);
            text-shadow: 0 0 15px rgba(0, 229, 255, 0.4);
            margin: 10px 0;
        }

        /* === Urgency Section === */
        .urgency {
            background: linear-gradient(90deg, rgba(0, 229, 255, 0.08), rgba(2, 4, 8, 0.9), rgba(0, 229, 255, 0.08));
            border-top: 1px solid var(--cyan-dim);
            border-bottom: 1px solid var(--cyan-dim);
            padding: 60px 0;
            text-align: center;
        }

        .timer-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
        }

        .time-box {
            background: rgba(0, 229, 255, 0.05);
            border: 1px solid var(--cyan-dim);
            padding: 20px;
            min-width: 100px;
            box-shadow: inset 0 0 10px rgba(0, 229, 255, 0.1);
        }

        .time-box span {
            display: block;
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            color: #fff;
        }

        .time-box label {
            font-family: 'Rajdhani', sans-serif;
            color: var(--cyan-primary);
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 1px;
        }

        /* === Chatbot Styles === */
        .chat-widget {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 9999;
            font-family: 'Inter', sans-serif;
        }

        .chat-btn {
            width: 60px;
            height: 60px;
            background: var(--cyan-primary);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: var(--cyan-glow);
            transition: all 0.3s;
            border: none;
            color: var(--bg-dark);
            animation: pulse 2.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 229, 255, 0.6); }
            70% { box-shadow: 0 0 0 15px rgba(0, 229, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 229, 255, 0); }
        }

        .chat-btn:hover {
            transform: scale(1.05);
        }

        .chat-window {
            position: absolute;
            bottom: 80px;
            right: 0;
            width: 390px;
            height: 540px;
            background: rgba(7, 12, 20, 0.98);
            backdrop-filter: blur(15px);
            border: 2px solid var(--cyan-primary);
            border-radius: 12px 12px 0 12px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.9), var(--cyan-glow);
            transform: scale(0);
            transform-origin: bottom right;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.2);
            overflow: hidden;
        }

        .chat-window.active {
            transform: scale(1);
        }

        .chat-header {
            background: rgba(0, 229, 255, 0.08);
            padding: 15px;
            border-bottom: 1px solid var(--cyan-dim);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header-title {
            font-family: 'Orbitron', sans-serif;
            color: #fff;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chat-header-title i {
            color: var(--cyan-primary);
        }

        .close-chat {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            transition: color 0.3s;
        }

        .close-chat:hover {
            color: var(--danger);
        }

        .chat-messages {
            flex-grow: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .chat-messages::-webkit-scrollbar { width: 5px; }
        .chat-messages::-webkit-scrollbar-track { background: var(--bg-dark); }
        .chat-messages::-webkit-scrollbar-thumb { background: var(--cyan-dim); border-radius: 10px; }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.92rem;
            line-height: 1.45;
            animation: fadeIn 0.25s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.bot {
            align-self: flex-start;
            background: rgba(2, 4, 8, 0.85);
            border-left: 3px solid var(--cyan-primary);
            color: var(--text-light);
        }

        .message.user {
            align-self: flex-end;
            background: var(--cyan-dim);
            border-right: 3px solid var(--cyan-primary);
            color: #fff;
        }
        
        .message.system {
            align-self: center;
            background: transparent;
            color: var(--cyan-primary);
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.8rem;
            text-transform: uppercase;
            text-align: center;
            border: 1px dashed var(--cyan-dim);
            width: 100%;
        }

        .chat-input {
            display: flex;
            padding: 15px;
            border-top: 1px solid var(--cyan-dim);
            background: var(--bg-dark);
        }

        .chat-input input {
            flex-grow: 1;
            background: transparent;
            border: none;
            color: #fff;
            font-family: 'Inter', sans-serif;
            outline: none;
            padding-right: 10px;
        }

        .chat-input button {
            background: transparent;
            border: none;
            color: var(--cyan-primary);
            cursor: pointer;
            transition: transform 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-input button:hover {
            transform: translateX(3px) scale(1.05);
        }
        
        .whatsapp-btn {
            display: inline-block;
            margin-top: 10px;
            background: #25D366;
            color: #fff;
            text-decoration: none;
            padding: 10px 18px;
            border-radius: 5px;
            font-family: 'Rajdhani', sans-serif;
            font-weight: bold;
            font-size: 0.95rem;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4);
            transition: all 0.2s;
        }

        .whatsapp-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 25px rgba(37, 211, 102, 0.6);
        }

        /* === Social Proof / Reviews === */
        .reviews {
            padding: 80px 0;
            background: rgba(10, 14, 23, 0.3);
        }

        .reviews-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .review-card {
            background: var(--bg-surface);
            border: 1px solid var(--cyan-dim);
            padding: 30px;
            position: relative;
        }

        .review-rating {
            color: var(--gold);
            margin-bottom: 15px;
        }

        .review-user {
            font-family: 'Rajdhani', sans-serif;
            font-weight: bold;
            color: #fff;
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
        }

        .review-user span {
            color: var(--cyan-primary);
        }

        /* === Footer === */
        footer {
            background: #010204;
            padding: 40px 0 20px;
            border-top: 1px solid #101b2e;
        }

        .footer-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            mar
